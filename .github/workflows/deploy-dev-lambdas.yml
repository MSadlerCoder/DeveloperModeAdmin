name: Deploy dev Lambdas

on:
  push:
    branches:
      - main
    paths:
      - 'lambdas/**'
      - 'lambda/**'
      - 'deploy_config.json'
      - 'scripts/deploy_lambdas.py'
      - 'scripts/deploy_api_routes.py'
      - '.github/workflows/deploy-dev-lambdas.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy development Lambda stack
    runs-on: ubuntu-latest
    environment: development
    env:
      DEPLOY_CONFIG_PATH: deploy_config.json
      API_STAGE: dev
      LAMBDA_ALIAS: dev
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      API_GATEWAY_ID: ${{ secrets.API_GATEWAY_ID }}
      API_DEFAULT_AUTHORIZER_ID: ${{ secrets.API_DEFAULT_AUTHORIZER_ID }}
      TASK_BUCKET: ${{ secrets.TASK_BUCKET }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN || 'http://localhost:5173' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deploy dependencies
        run: python -m pip install --upgrade boto3 botocore

      - name: Print deploy scope
        run: python - <<'PY'
          import json, os
          with open(os.environ['DEPLOY_CONFIG_PATH']) as fh:
              config = json.load(fh)
          deploy = {**config, **config.get('deploy', {})}
          print(json.dumps({
              'active_modules': deploy.get('active_modules', deploy.get('modules', '*')),
              'functions': deploy.get('functions', '*'),
              'deploy_lambdas': deploy.get('deploy_lambdas', True),
              'deploy_api_routes': deploy.get('deploy_api_routes', True),
              'deploy_sqs_triggers': deploy.get('deploy_sqs_triggers', False),
          }, indent=2))
          PY

      - name: Deploy Lambda functions and SQS triggers
        run: python scripts/deploy_lambdas.py --deploy-config "$DEPLOY_CONFIG_PATH"

      - name: Deploy API Gateway routes
        run: python scripts/deploy_api_routes.py --deploy-config "$DEPLOY_CONFIG_PATH" --stage "$API_STAGE" --lambda-alias "$LAMBDA_ALIAS"
